<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Village Explorer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #dce1e7, #f4f7fa);
      color: #1f1f1f;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 {
      margin-top: 40px;
      font-size: 2.2rem;
      color: #222;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(10px);
      padding: 12px 20px;
      border-radius: 50px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    input {
      flex: 1;
      padding: 10px 15px;
      border: none;
      border-radius: 30px;
      outline: none;
      font-size: 16px;
      background: rgba(255, 255, 255, 0.5);
    }

    button {
      padding: 10px 25px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(135deg, #007bff, #0056b3);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    button:hover {
      transform: scale(1.05);
    }

    #map {
      width: 90%;
      height: 400px;
      border-radius: 20px;
      margin-top: 30px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
      overflow: hidden;
    }

    #weather {
      margin-top: 20px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      width: 90%;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    #places {
      width: 90%;
      margin-top: 40px;
      margin-bottom: 60px;
    }

    h2 {
      margin: 40px 0 10px 0;
      font-size: 1.8rem;
      color: #222;
      border-left: 5px solid #007bff;
      padding-left: 10px;
      text-align: left;
    }

    .places-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .place-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .place-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
    }

    .place-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .info {
      padding: 15px;
      text-align: left;
    }

    .info h4 {
      margin: 0 0 5px;
      font-size: 1.1rem;
      color: #007bff;
    }

    .info p {
      margin: 5px 0;
      font-size: 0.9rem;
      color: #333;
    }

    .phone {
      font-size: 0.9rem;
      color: #444;
    }

    .info a {
      display: inline-block;
      margin-top: 5px;
      color: #007bff;
      font-size: 0.9rem;
      text-decoration: none;
    }

    .info a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      #map {
        height: 300px;
      }

      h1 {
        font-size: 1.8rem;
      }

      .search-box {
        flex-direction: column;
        align-items: stretch;
      }

      input,
      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <h1>Village Explorer 🌾</h1>
  <div class="search-box">
    <input id="villageInput" type="text" placeholder="Enter village or town name...">
    <button onclick="searchVillage()">Explore</button>
  </div>
  <div id="map"></div>
  <div id="weather"></div>
  <div id="places">
    <div id="hospitals">
      <h2>🏥 Hospitals</h2>
      <div class="places-list" id="hospitalList"></div>
    </div>
    <div id="restaurants">
      <h2>🍴 Restaurants</h2>
      <div class="places-list" id="restaurantList"></div>
    </div>
    <div id="temples">
      <h2>🛕 Temples</h2>
      <div class="places-list" id="templeList"></div>
    </div>
  </div>

  <script>
    const OPENWEATHER_API_KEY = "YOUR_OPENWEATHER_API_KEY";
    const UNSPLASH_ACCESS_KEY = "YOUR_UNSPLASH_API_KEY";
    let map;
    async function searchVillage() {
      const village = document.getElementById('villageInput').value.trim();
      if (!village) return alert("Please enter a village name");
      document.getElementById("hospitalList").innerHTML = "";
      document.getElementById("restaurantList").innerHTML = "";
      document.getElementById("templeList").innerHTML = "";
      document.getElementById("weather").innerHTML = "";
      const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${village}`);
      const geoData = await geoRes.json();
      if (geoData.length === 0) return alert("Village not found");
      const { lat, lon, display_name } = geoData[0];
      if (!map) {
        map = L.map('map').setView([lat, lon], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
      } else {
        map.setView([lat, lon], 13);
      }
      L.marker([lat, lon]).addTo(map).bindPopup(`<b>${display_name}</b>`).openPopup();
      const weatherRes = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${OPENWEATHER_API_KEY}&units=metric`);
      const weatherData = await weatherRes.json();
      if (weatherData.cod === 200) {
        document.getElementById("weather").innerHTML = `
          <h3>🌦️ Weather in ${display_name}</h3>
          <p><b>${weatherData.main.temp}°C</b> — ${weatherData.weather[0].description}</p>
          <p>💧 Humidity: ${weatherData.main.humidity}% | 🌬️ Wind: ${weatherData.wind.speed} m/s</p>
        `;
      }
      const categories = { hospital: "hospitalList", restaurant: "restaurantList", temple: "templeList" };
      for (let type in categories) {
        let query = "";
        if (type === "hospital") {
          query = `
            [out:json];
            (
              node["amenity"~"hospital|clinic|doctors"](around:10000,${lat},${lon});
              node["healthcare"~"hospital|clinic"](around:10000,${lat},${lon});
            );
            out center;
          `;
        } else if (type === "restaurant") {
          query = `
            [out:json];
            node["amenity"~"restaurant|cafe|fast_food|food_court"](around:10000,${lat},${lon});
            out center;
          `;
        } else if (type === "temple") {
          query = `
            [out:json];
            node["amenity"="place_of_worship"](around:10000,${lat},${lon});
            out center;
          `;
        }
        const res = await fetch("https://overpass-api.de/api/interpreter", { method: "POST", body: query });
        const data = await res.json();
        const list = document.getElementById(categories[type]);
        if (data.elements.length === 0) {
          list.innerHTML = "<p>No results found nearby.</p>";
          continue;
        }
        for (let place of data.elements) {
          if (place.tags && place.tags.name) {
            const name = place.tags.name;
            const phone = place.tags["phone"] || place.tags["contact:phone"] || "No contact info available";
            const imgRes = await fetch(`https://api.unsplash.com/search/photos?query=${encodeURIComponent(name)}&client_id=${UNSPLASH_ACCESS_KEY}&per_page=1`);
            const imgData = await imgRes.json();
            const image = imgData.results?.[0]?.urls?.small || "https://via.placeholder.com/250x150?text=No+Image";
            const wiki = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name)}`);
            const wikiData = await wiki.json();
            const summary = wikiData.extract || "No description available.";
            const wikiLink = wikiData.content_urls?.desktop?.page || "";
            const card = document.createElement("div");
            card.classList.add("place-card");
            card.innerHTML = `
              <img src="${image}" alt="${name}">
              <div class="info">
                <h4>${name}</h4>
                <p class="phone">📞 ${phone}</p>
                <p>${summary}</p>
                ${wikiLink ? `<a href="${wikiLink}" target="_blank">Read more</a>` : ""}
              </div>
            `;
            list.appendChild(card);
            L.marker([place.lat, place.lon]).addTo(map).bindPopup(`<b>${name}</b><br>${phone}`);
          }
        }
      }
    }
  </script>
</body>

</html>
